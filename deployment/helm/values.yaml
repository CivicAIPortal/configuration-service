replicaCount: 1
name: configuration-service

image:
  repository: repository
  name: configuration-service
  # -- Image tag
  # Uses .Chart.AppVersion if empty
  tag: ""
  # -- Image sha, usually generated by the CI
  # Uses image.tag if empty
  sha: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image pull secret when internal image is used
  pullSecrets: key

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8080"

serviceAccountName: configuration-service

ingress:
  enabled: false
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: configuration-service.example.io
      paths:
        - path: /
          port: 8080
  tls:
    - secretName: configuration-service-tls
      hosts:
        - configuration-service.example.io


resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 150m
    memory: 128Mi

service:
  port: 8080
  type: ClusterIP

server:
  http:
    host: ""
    port: 8080

data:
