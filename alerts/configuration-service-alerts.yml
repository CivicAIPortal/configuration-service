groups:
  - name: configuration-service
    rules:
      - alert: ConfigurationServiceDown
        expr: probe_success{job="service-health-checks", target="http://configuration-service:8080/health"} == 0
        for: 2m
        labels:
          severity: critical
          service: configuration-service
        annotations:
          summary: "Configuration service is unreachable"
          description: "Health probe for configuration-service has been failing for 2 minutes."

      - alert: ConfigurationServiceHighErrorRate
        expr: |
          (
            sum(rate(configuration_service_http_requests_total{status=~"5.."}[10m]))
            /
            clamp_min(sum(rate(configuration_service_http_requests_total[10m])), 1)
          ) * 100 > 5
        for: 10m
        labels:
          severity: warning
          service: configuration-service
        annotations:
          summary: "Configuration service error rate above 5%"
          description: "HTTP 5xx error rate has exceeded 5% for 10 minutes."

      - alert: ConfigurationServiceHighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(configuration_service_http_request_duration_seconds_bucket[10m])) by (le)
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: configuration-service
        annotations:
          summary: "Configuration service p95 latency above 1s"
          description: "95th percentile HTTP latency has exceeded 1 second for 10 minutes."

      - alert: ConfigurationServiceHighInFlightRequests
        expr: configuration_service_http_in_flight_requests > 20
        for: 5m
        labels:
          severity: warning
          service: configuration-service
        annotations:
          summary: "Configuration service high in-flight request count"
          description: "In-flight HTTP requests have remained above 20 for 5 minutes."
