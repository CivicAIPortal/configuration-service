name: Docker and Helm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  dockerbuild:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
      repo_name: ${{ steps.set-repo-name.outputs.repo_name }}
    env:
      CI_DEFAULT_BRANCH: main
      CI_COMMIT_REF_NAME: ${{ github.ref_name }}
      CI_COMMIT_TAG: ${{ github.event.release.tag_name || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set IMAGE_TAG
        id: set-tag
        run: |
          if [ -z "${IMAGE_TAG}" ]; then
            if [ "$CI_COMMIT_REF_NAME" == "$CI_DEFAULT_BRANCH" ]; then
              IMAGE_TAG="latest"
            elif [ -n "$CI_COMMIT_TAG" ]; then
              NOSLASH=$(echo "$CI_COMMIT_TAG" | tr -s / - )
              IMAGE_TAG="${NOSLASH//[^a-zA-Z0-9\-\.]/}"
            else
              NOSLASH=$(echo "$CI_COMMIT_REF_NAME" | tr -s / - )
              IMAGE_TAG="branch-${NOSLASH//[^a-zA-Z0-9\-]/}"
            fi
          fi
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set Repo Name
        id: set-repo-name
        run: |
          IMAGE_REPO=$(basename "${GITHUB_REPOSITORY}")
          echo "repo_name=$IMAGE_REPO" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Find and build Docker images (multi-arch)
        env:
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_CREDENTIALS: ${{ secrets.HARBOR_CREDENTIALS }}
        run: |
          git clone https://x-access-token:${{ github.token }}@github.com/CivicAIPortal/dev-ops.git devops
          chmod +x ./devops/scripts/harborconfig.sh
          . ./devops/scripts/harborconfig.sh deployment/docker/harbor.config

          echo "$HARBOR_PASSWORD" | docker login $HARBOR_HOST --username "$HARBOR_USERNAME" --password-stdin

          IMAGE_TAG="${{ steps.set-tag.outputs.image_tag }}"
          PLATFORMS="linux/amd64,linux/arm64"
          REPO_NAME="${{ steps.set-repo-name.outputs.repo_name }}"
          FINAL_NAME="$REPO_NAME"
          IMAGE="$HARBOR_HOST/$HARBOR_PROJECT/$FINAL_NAME:$IMAGE_TAG"

          docker buildx build \
            --platform "$PLATFORMS" \
            --file deployment/docker/Dockerfile \
            --push \
            --tag "$IMAGE" \
            .

  helm-setup:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    env:
      CI_DEFAULT_BRANCH: main
      CI_COMMIT_REF_NAME: ${{ github.ref_name }}
      CI_COMMIT_TAG: ${{ github.event.release.tag_name || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set IMAGE_TAG
        id: set-tag
        run: |
          if [ -z "${IMAGE_TAG}" ]; then
            if [ "$CI_COMMIT_REF_NAME" == "$CI_DEFAULT_BRANCH" ]; then
              IMAGE_TAG="latest"
            elif [ -n "$CI_COMMIT_TAG" ]; then
              NOSLASH=$(echo "$CI_COMMIT_TAG" | tr -s / - )
              IMAGE_TAG="${NOSLASH//[^a-zA-Z0-9\-\.]/}"
            else
              NOSLASH=$(echo "$CI_COMMIT_REF_NAME" | tr -s / - )
              IMAGE_TAG="branch-${NOSLASH//[^a-zA-Z0-9\-]/}"
            fi
          fi
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  helm:
    needs: helm-setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Generate Helm Flyway migrations from db/migrations
        run: go run ./tools/sync_helm_migrations.go .

      - name: Use IMAGE_TAG
        run: |
          echo "The image tag is: ${{ needs.helm-setup.outputs.image_tag }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.13.0

      - name: Find and Push Helm Charts
        env:
          HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
          HARBOR_CREDENTIALS: ${{ secrets.HARBOR_CREDENTIALS }}
        run: |
          git clone https://x-access-token:${{ github.token }}@github.com/CivicAIPortal/dev-ops.git devops
          chmod +x ./devops/scripts/harborconfig.sh
          . ./devops/scripts/harborconfig.sh deployment/helm/harbor.config

          helm registry login "$HARBOR_HOST" \
            --username "$HARBOR_USERNAME" \
            --password "$HARBOR_PASSWORD"

          CHART_DIR="deployment/helm"
          cd "$CHART_DIR"
          echo "Build Dependencies"
          IMAGE_TAG="${{ needs.helm-setup.outputs.image_tag }}"
          sed -i.bak -E "s/^(version: .+)-tag$/\1-${IMAGE_TAG}/" Chart.yaml
          helm dependency build
          echo "Build Chart"
          helm package .

          CHART_NAME=$(grep '^name:' Chart.yaml | awk '{print $2}')
          PACKAGE_FILE="${CHART_NAME}-*.tgz"
          echo "Push Chart"
          helm push $PACKAGE_FILE oci://$HARBOR_HOST/$HARBOR_PROJECT
